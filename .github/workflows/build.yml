name: Build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout Builds Branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm $GITHUB_WORKSPACE/builds/*.jar || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson

          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds || true
          cp **/build/*.jar $GITHUB_WORKSPACE/builds || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ || echo "No plugins.json found"

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          
          # Delete ProviderTemplate files before staging changes to Git
          echo "Filtering out ProviderTemplate binaries..."
          rm -f ProviderTemplate.cs3
          rm -f ProviderTemplate.jar

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit --amend -m "Build $GITHUB_SHA" || git commit -m "Build $GITHUB_SHA"
            git push --force
          else
            echo "No changes to push"
          fi